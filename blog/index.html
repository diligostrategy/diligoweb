<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Diligo Strategy</title>
  <meta name="description" content="Content marketing insights, SEO tips, and multilingual strategy guides from Diligo Strategy.">
  <link rel="icon" type="image/png" href="../img/favico.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .blog-page-hero {
      padding: 140px 0 60px;
      background: var(--navy); color: #fff; text-align: center;
      position: relative; overflow: hidden;
    }
    .blog-page-hero::before {
      content: ''; position: absolute; top: -30%; right: -10%;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(251,94,1,.15), transparent 65%);
      filter: blur(60px);
    }
    .blog-page-hero h1 { position: relative; z-index: 1; }
    .blog-page-hero p { position: relative; z-index: 1; color: rgba(255,255,255,.6); max-width: 500px; margin: 16px auto 0; }

    .blog-listing { padding: 60px 0 100px; }
    .blog-listing-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 32px;
    }
    .blog-list-card {
      background: var(--gray-50); border: 1px solid var(--gray-200);
      border-radius: 16px; overflow: hidden; text-decoration: none;
      color: inherit; transition: .3s; display: flex; flex-direction: column;
    }
    .blog-list-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,.08);
      border-color: var(--orange);
    }
    .blog-list-card img {
      width: 100%; height: 200px; object-fit: cover;
      border-bottom: 1px solid var(--gray-200);
    }
    .blog-list-card .no-img {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, var(--navy), #1a2d4a);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }
    .blog-card-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
    .blog-card-meta {
      font-size: 12px; color: var(--gray-400); margin-bottom: 10px;
      display: flex; gap: 8px; align-items: center;
    }
    .blog-card-cat {
      background: rgba(251,94,1,.1); color: var(--orange);
      padding: 2px 10px; border-radius: 50px; font-weight: 600;
      font-size: 11px; text-transform: uppercase;
    }
    .blog-card-body h3 {
      font-size: 1.15rem; margin-bottom: 12px; line-height: 1.4; color: var(--navy);
    }
    .blog-card-body .read-more {
      margin-top: auto; padding-top: 12px;
      color: var(--orange); font-size: 13px; font-weight: 600;
    }
    .blog-filter {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 40px;
    }
    .blog-filter button {
      padding: 8px 20px; border-radius: 50px; border: 1px solid var(--gray-200);
      background: #fff; color: var(--text-light); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: .2s; font-family: 'Inter', sans-serif;
    }
    .blog-filter button:hover, .blog-filter button.active {
      background: var(--orange); color: #fff; border-color: var(--orange);
    }
  </style>
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="../" class="nav-logo"><img src="../img/logo.png" alt="Diligo Strategy" height="40"></a>
      <div class="nav-links" id="navLinks">
        <a href="../#services">Services</a>
        <a href="../#about">About</a>
        <a href="./">Blog</a>
        <a href="../#contact">Contact</a>
        <a href="../#contact" class="nav-cta">Let's Talk</a>
      </div>
      <div class="nav-right">
        <button class="nav-hamburger" id="navHamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <section class="blog-page-hero">
    <div class="container">
      <h1>Our <span class="text-gradient">Blog</span></h1>
      <p>Content marketing insights, SEO tips, and multilingual strategy guides.</p>
    </div>
  </section>

  <section class="blog-listing">
    <div class="container">
      <div class="blog-filter" id="blogFilter"></div>
      <div class="blog-listing-grid" id="blogGrid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Diligo Strategy LLC. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="../js/blog-data.js"></script>
  <script>
    // Build filter buttons
    const categories = ['All', ...new Set(BLOG_POSTS.map(p => p.category))];
    const filterDiv = document.getElementById('blogFilter');
    categories.forEach((cat, i) => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      if (i === 0) btn.classList.add('active');
      btn.addEventListener('click', () => {
        filterDiv.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPosts(cat === 'All' ? null : cat);
      });
      filterDiv.appendChild(btn);
    });

    function renderPosts(filterCat) {
      const grid = document.getElementById('blogGrid');
      const posts = filterCat ? BLOG_POSTS.filter(p => p.category === filterCat) : BLOG_POSTS;

      grid.innerHTML = posts.map(p => {
        const d = new Date(p.date);
        const dateStr = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        const imgHtml = p.image
          ? '<img src="' + p.image + '" alt="' + p.title + '">'
          : '<div class="no-img">&#128221;</div>';

        return '<a href="' + p.slug + '.html" class="blog-list-card">'
          + imgHtml
          + '<div class="blog-card-body">'
          + '<div class="blog-card-meta"><span class="blog-card-cat">' + p.category + '</span><span>' + dateStr + '</span></div>'
          + '<h3>' + p.title + '</h3>'
          + '<span class="read-more">Read article &rarr;</span>'
          + '</div></a>';
      }).join('');
    }

    renderPosts(null);

    // Mobile menu
    document.getElementById('navHamburger').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
      document.getElementById('navHamburger').classList.toggle('open');
    });
    document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', () => {
      document.getElementById('navLinks').classList.remove('open');
      document.getElementById('navHamburger').classList.remove('open');
    }));
  </script>
</body>
</html>
